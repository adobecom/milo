  6 rows = [titleRow, imageRow1, imageRow2, textRow, ctaRow, mockupRow].
  imageRow1 + imageRow2 each have 4 cells (the 8 cards).
  mockupRow has 3 cells: [mobileMockup, desktopMockup, desktopPanel].
  img/picture src is intentionally omitted to avoid 404s in CI — the block
  falls back to default card dimensions when no width/height attrs are present.
-->
