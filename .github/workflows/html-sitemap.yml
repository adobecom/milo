name: HTML Sitemap Generator

# Triggers
# - schedule:          full pipeline against the federal config (CLI defaults).
# - workflow_dispatch: same as scheduled, run on demand. Only `force` exposed.
#
# Per-geo delivery scope (push / preview / publish) is driven by the
# `geo-map.stage` column in the config. The CLI runs the full pipeline by
# default; --stages is an override reserved for local development.

on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Push even if remote content is unchanged'
        type: boolean
        default: false
  schedule:
    - cron: '0 * * * *'  # hourly, on the hour (UTC)

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        working-directory: .github/workflows/html-sitemap
        run: npm ci

      - name: Lint
        working-directory: .github/workflows/html-sitemap
        run: npm run lint

      - name: Run tests
        working-directory: .github/workflows/html-sitemap
        run: npm test

      - name: Run pipeline
        working-directory: .github/workflows/html-sitemap
        env:
          ROLLING_IMPORT_IMS_URL: ${{ secrets.ROLLING_IMPORT_IMS_URL }}
          ROLLING_IMPORT_CLIENT_ID: ${{ secrets.ROLLING_IMPORT_CLIENT_ID }}
          ROLLING_IMPORT_CLIENT_SECRET: ${{ secrets.ROLLING_IMPORT_CLIENT_SECRET }}
          ROLLING_IMPORT_CODE: ${{ secrets.ROLLING_IMPORT_CODE }}
          ROLLING_IMPORT_GRANT_TYPE: ${{ secrets.ROLLING_IMPORT_GRANT_TYPE }}
          AEM_ADMIN_TOKEN_ADOBECOM_DA_BACOM: ${{ secrets.AEM_ADMIN_TOKEN_ADOBECOM_DA_BACOM }}
          AEM_ADMIN_TOKEN_ADOBECOM_DA_CC: ${{ secrets.AEM_ADMIN_TOKEN_ADOBECOM_DA_CC }}
        run: |
          ARGS="--da-root /"
          if [ "${{ inputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          echo "Running: node generate.js $ARGS"
          node generate.js $ARGS
