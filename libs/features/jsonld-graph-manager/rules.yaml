- name: offer-price
  section: "Type-specific: Offer"
  severity: error
  requirement: An Offer node MUST have price and priceCurrency properties.
  applies_to: [Offer]
  implements: []
  tested_by: []
  interacts_with: [softwareapplication-offers, softwareapplication-offer-provenance]
  notes: >
    Required for the Google Software App rich result. Evaluated for any
    Offer node referenced by SoftwareApplication.offers. Not validated at
