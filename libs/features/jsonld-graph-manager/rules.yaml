- name: softwareapplication-offers
  section: "Type-specific: SoftwareApplication"
  severity: warn
  requirement: >
    A SoftwareApplication node SHOULD have an offers property referencing
    one or more Offer nodes by @id. Multiple offers (e.g., paid
    subscription and free trial) are encoded as separate Offer nodes.
  applies_to: [SoftwareApplication, WebApplication, MobileApplication, VideoGame]
  implements: [extractInlineEntities]
  tested_by: [manager.test.js]
  interacts_with: [offer-price, softwareapplication-offer-provenance]
  notes: >
    Each Offer MAY include a potentialAction property to express usage
    actions, e.g. BuyAction, TryAction. When offers are absent, the manager
    leaves them absent rather than inventing commercial data.
  status: active
  last_updated: "2026-07-23"

- name: softwareapplication-rating-or-review
  section: "Type-specific: SoftwareApplication"
  severity: warn
  requirement: >
    A SoftwareApplication node SHOULD have either an aggregateRating or a
    review property.
  applies_to: [SoftwareApplication, WebApplication, MobileApplication, VideoGame]
  implements: []
  tested_by: []
  interacts_with: [aggregaterating-min-rating-value, aggregaterating-min-rating-count,
                   aggregaterating-extraction]
  notes: >
    Required for the Google Software App rich result. The manager produces
    incomplete nodes when this data is not available from producers. Note:
    when an AggregateRating is stripped under aggregaterating-min-rating-value
    or -count, this rule will start firing for pages that previously
    satisfied it.
  status: unimplemented
  last_updated: "2026-05-29"

