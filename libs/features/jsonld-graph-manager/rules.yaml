- name: softwareapplication-offer-provenance
  section: "Type-specific: Offer"
  severity: error
  requirement: >
    The graph manager MUST NOT synthesize Offer price, currency, availability,
    category, or trial terms. Every Offer MUST originate from producer data.
    When no producer supplies an Offer, SoftwareApplication.offers remains
    absent or empty.
  applies_to: [Offer, SoftwareApplication, WebApplication, MobileApplication, VideoGame]
  implements: [JsonLdGraphManager.rewrite]
  tested_by: [manager.test.js]
  interacts_with: [softwareapplication-offers, offer-price]
  notes: >
    Commercial facts are owned by product and commerce producers, which can
    supply market-appropriate pricing and terms. Missing data may prevent a
    Software App rich result, but is preferable to publishing an unsupported
    claim.
  status: active
  last_updated: "2026-07-23"

- name: aggregaterating-min-rating-value
  section: "Type-specific: AggregateRating"
  severity: error
  requirement: >
    An AggregateRating node MUST have ratingValue >= 4.0 (on the default
    1-5 scale). When the threshold is not met, the manager omits the
    AggregateRating node from the graph AND removes any aggregateRating
    reference from host entities so consumers do not see a dangling @id.
  applies_to: [AggregateRating]
  implements: [aggregateRatingMeetsThresholds, AGGREGATE_RATING_MIN_VALUE,
               JsonLdGraphManager.rewrite]
  tested_by: [conformance.test.js]
  interacts_with: [aggregaterating-min-rating-count, softwareapplication-rating-or-review,
                   aggregaterating-singleton]
  notes: >
    Milo policy, not a Google rule: poor ratings under the Adobe brand are
    worse than no rating signal. Threshold is configurable per future
    policy revision.
  status: active
  last_updated: "2026-05-29"

- name: aggregaterating-min-rating-count
  section: "Type-specific: AggregateRating"
  severity: error
  requirement: >
    An AggregateRating node MUST have ratingCount >= 100. When the
    threshold is not met, the manager omits the AggregateRating node from
    the graph AND removes any aggregateRating reference from host entities.
  applies_to: [AggregateRating]
  implements: [aggregateRatingMeetsThresholds, AGGREGATE_RATING_MIN_COUNT,
               JsonLdGraphManager.rewrite]
  tested_by: [conformance.test.js]
  interacts_with: [aggregaterating-min-rating-value, softwareapplication-rating-or-review,
                   aggregaterating-singleton]
  notes: >
    Milo policy, not a Google rule: small-sample ratings are noisy and
    brittle; below-threshold counts are suppressed to avoid surfacing
    statistical accidents to consumers. Threshold is configurable per
    future policy revision.
  status: active
  last_updated: "2026-05-29"

