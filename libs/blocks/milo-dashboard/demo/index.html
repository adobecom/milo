<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Milo World Dashboard — demo</title>
  <!-- Milo design tokens (spacing/color/type vars) + the block's own CSS -->
  <link rel="stylesheet" href="/libs/styles/styles.css" />
  <link rel="stylesheet" href="/libs/blocks/milo-dashboard/milo-dashboard.css" />
  <style>
    body { margin: 0; padding: 24px; background: #fafafa; font-family: adobe-clean, system-ui, sans-serif; }
    .demo-banner {
      max-width: 1200px; margin: 0 auto 16px; padding: 8px 14px; border-radius: 8px;
      background: #fff3cd; border: 1px solid #ffe69c; color: #664d03; font-size: 13px;
    }
    .milo-dashboard { max-width: 1200px; margin: 0 auto; background: #fff; border: 1px solid #e6e6e6; border-radius: 10px; padding: 20px; }
  </style>
</head>
<body>
  <div class="demo-banner">
    <strong>Demo mode</strong> — all data below is mocked in-browser (no backend, no auth). Charts render with the real echarts bundle. Click the Day/Week/Month toggle, the health-trend category buttons, and any project row to drill in.
  </div>

  <div class="milo-dashboard">
    <!-- config rows the block reads; api is irrelevant here since fetch is mocked -->
    <div><div>api</div><div>http://mock.local</div></div>
    <div><div>since</div><div>30d</div></div>
  </div>

  <script type="module">
    import { setConfig } from '/libs/utils/utils.js';

    // ---- Mock data (varies by ?since and ?interval so the Day/Week/Month
    //      toggle visibly changes every number) -----------------------------
    const DAY = 86400000;
    const NOW = Date.parse('2026-06-01T00:00:00Z');

    // Trend buckets for a given interval (matches the block's trendSince windows).
    const bucketsFor = (interval) => {
      if (interval === 'day') return Array.from({ length: 30 }, (_, i) => new Date(NOW - (29 - i) * DAY).toISOString());
      if (interval === 'month') return Array.from({ length: 12 }, (_, i) => new Date(Date.UTC(2025, 5 + i, 1)).toISOString());
      return Array.from({ length: 12 }, (_, i) => new Date(NOW - (11 - i) * 7 * DAY).toISOString());
    };
    // Per-bucket magnitude scales with the bucket size.
    const edsScale = (interval) => (interval === 'day' ? 0.18 : interval === 'month' ? 4.2 : 1);

    const edsFor = (interval) => {
      const s = edsScale(interval);
      return bucketsFor(interval).flatMap((bucket, i) => ([
        { bucket, route: 'live', amount: String(Math.round((110 + i * 6 + Math.sin(i / 2) * 30) * s)) },
        { bucket, route: 'preview', amount: String(Math.round((250 + i * 8 + Math.sin(i / 2) * 50) * s)) },
      ]));
    };

    const preflightFor = (interval) => bucketsFor(interval).map((bucket, i) => ({
      bucket,
      avg_overall: (72 + i * 1.3).toFixed(2),
      avg_performance: (68 + i * 1.5).toFixed(2),
      avg_seo: (80 + i * 0.7).toFixed(2),
      avg_accessibility: (65 + i * 1.8).toFixed(2),
      avg_assets: (88 - i * 0.3).toFixed(2),
      checks: 30 + i,
    }));

    // Overview = current period vs prior period; magnitude scales with the window.
    const overviewFor = (since) => {
      const m = since === '1d' ? 1 : since === '7d' ? 7 : 30;
      const current = {
        publishes: 62 * m,
        previews: 134 * m,
        avg_health: (since === '1d' ? 80.6 : since === '7d' ? 83.1 : 84.2).toFixed(2),
        active_projects: since === '1d' ? 4 : 7,
        pages_below_70: Math.round(1.3 * m),
      };
      const f = since === '1d' ? 0.72 : since === '7d' ? 0.9 : 1.16; // prior publishes factor
      const prior = {
        publishes: Math.round(current.publishes * f),
        previews: Math.round(current.previews * 0.96),
        avg_health: (Number(current.avg_health) - (since === '1d' ? 1.5 : since === '7d' ? -0.4 : 3.9)).toFixed(2),
        active_projects: Math.max(1, current.active_projects - 1),
        pages_below_70: current.pages_below_70 + (since === '1d' ? 1 : since === '7d' ? 5 : 14),
      };
      return { since, current, prior, delta: {} };
    };

    // Per-consumer rows; publish/preview counts scale with the window.
    const projectsFor = (since) => {
      const m = since === '1d' ? 1 : since === '7d' ? 7 : 30;
      const base = [
        { site: 'milo', pub: 18, prev: 38, health: '86.40' },
        { site: 'cc-shared', pub: 14, prev: 33, health: '78.90' },
        { site: 'da-blog', pub: 11, prev: 20, health: '91.20' },
        { site: 'da-express-milo', pub: 9, prev: 18, health: '72.10' },
        { site: 'dc', pub: 6, prev: 14, health: '41.00' },
        { site: 'blog', pub: 4, prev: 9, health: null },
      ];
      return base.map((b) => ({
        site: b.site,
        publishes: b.pub * m,
        previews: b.prev * m,
        avg_health: b.health,
        checks: Math.round(b.pub * m * 0.4),
      }));
    };

    const totals = {
      total: 12840,
      perSite: [
        { site: 'milo', pages: 5400 },
        { site: 'cc-shared', pages: 4100 },
        { site: 'da-blog', pages: 3340 },
      ],
    };

    const testPagesCsv = [
      'path,site,state,signal,last_indexed_at',
      '/drafts/spring-test.html,milo,live,path,2026-05-20',
      '/test/landing-qa.html,cc-shared,live,path,2026-05-21',
      '/drafts/preview-only.html,da-blog,live,path,2026-05-22',
    ].join('\n');

    const worstPages = (project) => ({
      data: [
        { url: `https://main--${project}--adobecom.aem.live/products/featured.html`, performance_score: '38.00', project_key: project, created_at: '2026-05-20' },
        { url: `https://main--${project}--adobecom.aem.live/plans/individual.html`, performance_score: '44.50', project_key: project, created_at: '2026-05-21' },
        { url: `https://main--${project}--adobecom.aem.live/learn/tutorial.html`, performance_score: '52.10', project_key: project, created_at: '2026-05-22' },
        { url: `https://main--${project}--adobecom.aem.live/campaign/spring.html`, performance_score: '61.80', project_key: project, created_at: '2026-05-23' },
      ],
      pagination: { total: 4, page: 1, limit: 20 },
    });

    // ---- Mock fetch (intercept by pathname; honours since + interval) ------
    const realFetch = window.fetch.bind(window);
    window.fetch = async (input, opts) => {
      const raw = typeof input === 'string' ? input : (input.href || input.url || String(input));
      const url = new URL(raw, 'http://mock.local');
      const p = url.pathname;
      const since = url.searchParams.get('since') || '30d';
      const interval = url.searchParams.get('interval') || 'week';
      const json = (body) => new Response(JSON.stringify(body), { status: 200, headers: { 'content-type': 'application/json' } });
      if (p === '/overview') return json(overviewFor(since));
      if (p === '/trends/eds') return json(edsFor(interval));
      if (p === '/trends/preflight') {
        const project = url.searchParams.get('project');
        const rows = preflightFor(interval);
        // drill-in passes ?project=<site>; return a slightly lower-scored variant
        return json(project ? rows.map((r) => ({ ...r, avg_overall: (Number(r.avg_overall) - 6).toFixed(2) })) : rows);
      }
      if (p === '/projects') return json(projectsFor(since));
      if (p === '/totals') return json(totals);
      if (p === '/test-pages') return new Response(testPagesCsv, { status: 200, headers: { 'content-type': 'text/csv' } });
      if (p === '/preflight-logs') return json(worstPages(url.searchParams.get('projectKey') || 'milo'));
      // anything else (e.g. the echarts bundle) goes to the real network/static server
      return realFetch(input, opts);
    };

    // ---- Boot the block ---------------------------------------------------
    setConfig({ codeRoot: '/libs', miloLibs: '/libs', imsClientId: 'demo', env: { name: 'local' }, locale: { ietf: 'en-US', prefix: '' } });
    const { default: init } = await import('/libs/blocks/milo-dashboard/milo-dashboard.js');
    await init(document.querySelector('.milo-dashboard'));
  </script>
</body>
</html>
