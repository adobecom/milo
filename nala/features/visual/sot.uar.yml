# UAR / Brand Concierge — block variant visual regression
#
# Source: BC block variant catalog (Confluence — Jacky Sun).
# One representative URL per BC block variant. Many real product
# pages share the same block variant (e.g. 5 different CC category
# pages all use "basic inline + floating button"), so we test the
# variant once instead of every page that consumes it.
#
# Comparison modes:
#   • Milolibs (string)      — A=page, B=page?milolibs=stage
#     For real product pages — tests what stage milo changes for
#     pages that already render BC.
#   • Explicit pair (a/b)    — for block fragments where we
#     explicitly compare main--milo vs stage--milo, or pages using a
#     non-default milolibs branch (e.g. bc-floating-input-update,
#     site-redesign-foundation, webclient=baseStage).
#
# Note: scroll wait strategy is required — BC entry blade is lazy-
# injected (Target treatment + IntersectionObserver). Without
# scrolling, screenshots capture the page before BC mounts.
__config__:
  waitStrategy: scroll

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Real product pages (milolibs mode — A = stage URL, B = + ?milolibs=stage)
# One representative page per variant
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Basic Inline — stage adobe.com /cc-shared fragment (the canonical
# inline blade host)
'basic-inline': 'https://www.stage.adobe.com/cc-shared/fragments/uar/brand-concierge/brand-concierge'

# Basic Inline — direct block fragment comparison (main milo vs stage milo)
'basic-inline-block':
  a: 'https://main--milo--adobecom.aem.live/drafts/nala/blocks/brand-concierge/brand-concierge'
  b: 'https://stage--milo--adobecom.aem.live/drafts/nala/blocks/brand-concierge/brand-concierge'

# Basic inline light — BACOM Brand Concierge product page
'basic-inline-light': 'https://business.stage.adobe.com/products/brand-concierge.html'

# Basic inline light — also used on Adobe.com CCO (different layout
# context: marketing landing vs. product detail)
'basic-inline-light-cco': 'https://www.stage.adobe.com/creativecloud.html'

# Basic hero — BACOM home
'basic-hero': 'https://business.stage.adobe.com/'

# 404 page — adobe.com error page
'bc-404': 'https://www.stage.adobe.com/error-pages/404.html'

# Basic inline + floating button (representative: design — also
# covers /creativecloud/adobe/campaign/pricing, video, illustration;
# all share this variant)
'inline-floating-button': 'https://www.stage.adobe.com/creativecloud/design.html'

# Basic inline + floating button — Photography Apps (different
