'inline-floating-button-photo': 'https://www.stage.adobe.com/creativecloud/photography/apps.html'

# Floating button delay — BACOM b2b-marketing solution page
'floating-button-delay': 'https://business.stage.adobe.com/solutions/b2b-marketing.html'

# Floating button delay — BACOM AI top-level page (different page
# template than solutions/*)
'floating-button-delay-ai': 'https://business.stage.adobe.com/ai.html'

# Floating anchor hide — adobe.com homepage variant
'floating-anchor-hide': 'https://www.stage.adobe.com/'

